name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      # onBrokenLinks: 'throw' makes this fail on dead internal links.
      - run: npm run build
      - name: Upload static build
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: build
