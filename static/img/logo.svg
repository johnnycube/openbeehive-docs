<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eeb455"/>
      <stop offset="0.55" stop-color="#c77f22"/>
      <stop offset="1" stop-color="#9c5d18"/>
    </linearGradient>
    <clipPath id="body"><ellipse cx="256" cy="258" rx="46" ry="60"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Honeycomb cell framing the bee (kept hexagon motif) -->
  <polygon points="92,252 175,108 339,108 422,252 339,396 175,396"
    fill="none" stroke="#fffdf7" stroke-width="19" stroke-linejoin="round" opacity="0.9"/>

  <!-- Wings -->
  <g fill="#fffdf7" opacity="0.95">
    <ellipse cx="212" cy="210" rx="31" ry="48" transform="rotate(-24 212 210)"/>
    <ellipse cx="300" cy="210" rx="31" ry="48" transform="rotate(24 300 210)"/>
  </g>

  <!-- Body + stripes -->
  <ellipse cx="256" cy="258" rx="46" ry="60" fill="#f7b733"/>
  <g clip-path="url(#body)" fill="#2c2316">
    <rect x="204" y="220" width="104" height="20"/>
    <rect x="204" y="258" width="104" height="20"/>
    <rect x="204" y="296" width="104" height="20"/>
  </g>

  <!-- Head + antennae -->
  <circle cx="256" cy="198" r="23" fill="#2c2316"/>
  <g stroke="#2c2316" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M247 181 q-12 -20 -26 -25"/>
    <path d="M265 181 q12 -20 26 -25"/>
  </g>
</svg>
